<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secret Verification</title>

<style>
body{
    margin:0;
    font-family: Georgia, serif;
    background:#0e1a24;
    color:white;
    text-align:center;
    overflow:hidden;
}

/* Pages */
.page{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.active{
    display:flex;
}

/* Buttons */
button{
    padding:12px 25px;
    margin:10px;
    font-size:18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#ff4d6d;
    color:white;
}

/* Input */
input{
    padding:10px;
    font-size:16px;
    border-radius:6px;
    border:none;
    text-align:center;
}

/* Pirate Paper */
#finalPage{
    background:#061017;
}

.paper{
    width:60%;
    max-width:500px;
    background:#f4e2b8;
    color:#3b2b1a;
    padding:40px;
    border-radius:10px;
    box-shadow:0 0 40px rgba(0,0,0,0.8);
    transform:translateY(600px);
    animation:rise 3s forwards;
}

@keyframes rise{
    to{
        transform:translateY(0);
    }
}

h1{
    margin-bottom:20px;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1" class="page active">
    <h1>Verify Your Identity</h1>
    <button onclick="goPage2()">GO</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
    <h1>Are you Nivashini?</h1>
    <img src="https://i.imgur.com/8Km9tLL.jpg" width="200" style="border-radius:10px;"><br>
    <button onclick="goPage3()">Yes</button>
    <button onclick="goStart()">No</button>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page">
    <h1>What is our Netflix profile name?</h1>
    <input type="text" id="answer" placeholder="Enter answer">
    <br>
    <button onclick="checkAnswer()">Submit</button>
</div>

<!-- FINAL PAGE -->
<div id="finalPage" class="page">
    <div class="paper">
        <h1>hello</h1>
    </div>
</div>

<script>
function goPage2(){
    showPage("page2");
}

function goPage3(){
    showPage("page3");
}

function goStart(){
    showPage("page1");
}

function checkAnswer(){
    let ans = document.getElementById("answer").value;
    if(ans === "NAR"){
        showPage("finalPage");
    } else{
        alert("Wrong answer!");
        showPage("page1");
    }
}

function showPage(id){
    let pages = document.querySelectorAll(".page");
    pages.forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
